<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockOS - Gerenciamento de Estoque</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/estoque.css">
</head>
<body class="admin-body">
    
    <div class="dashboard-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-logo">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L3.5 7V17L12 22L20.5 17V7L12 2Z" stroke="#10b981" stroke-width="2" stroke-linejoin="round"/>
                        <path d="M12 6L7 9V15L12 18L17 15V9L12 6Z" fill="#10b981"/>
                    </svg>
                </div>
                <span class="brand-name">StockOS</span>
            </div>

            <nav class="sidebar-nav">
                <a href="/views/home.html" class="nav-item">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
                <a href="/views/estoque.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                    Estoque
                </a>
                <a href="#" class="nav-item">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Fornecedores
                </a>
            </nav>

            <div class="sidebar-footer">
                <button id="logoutBtn" class="logout-link">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Sair da conta
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>Gerenciamento de Estoque</h1>
                    <p>Controle de inventário profissional e intuitivo.</p>
                </div>
                <div class="header-right">
                    <div class="user-profile">
                        <span id="userNameDisplay">Usuário</span>
                        <div class="avatar">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        </div>
                    </div>
                </div>
            </header>

            <div class="dashboard-grid">
                <!-- Summary Stats -->
                <section class="summary-section">
                    <div class="stats-card">
                        <div class="stats-info">
                            <span class="stats-label">TOTAL DE ITENS</span>
                            <h2 id="totalItens">0</h2>
                        </div>
                        <div class="stats-icon">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#10b981" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
                        </div>
                    </div>
                    <div class="stats-card alert">
                        <div class="stats-info">
                            <span class="stats-label">ESTOQUE BAIXO</span>
                            <h2 id="itensBaixoEstoque">0</h2>
                        </div>
                        <div class="stats-icon">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#f43f5e" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                        </div>
                    </div>
                </section>

                <div class="content-layout">
                    <!-- Form Section -->
                    <section class="form-container">
                        <div class="card">
                            <h3 class="card-title">Novo Item</h3>
                            <form id="estoqueForm">
                                <input type="hidden" id="editId" value="-1">
                                <div class="input-group">
                                    <label for="item">ITEM</label>
                                    <input type="text" id="item" placeholder="Nome do produto" required>
                                </div>
                                <div class="input-group">
                                    <label for="categoria">CATEGORIA</label>
                                    <input type="text" id="categoria" placeholder="Ex: Informática" required>
                                </div>
                                <div class="input-group-row">
                                    <div class="input-group">
                                        <label for="quantidade">QTD.</label>
                                        <input type="number" id="quantidade" placeholder="0" min="0" required>
                                    </div>
                                    <div class="input-group">
                                        <label for="preco">PREÇO (R$)</label>
                                        <input type="number" id="preco" step="0.01" placeholder="0.00" required>
                                    </div>
                                </div>
                                <div class="form-actions">
                                    <button type="submit" id="submitBtn" class="btn-primary">Adicionar Item</button>
                                    <button type="button" id="cancelBtn" class="btn-secondary" style="display: none;">Cancelar</button>
                                </div>
                            </form>
                            <div id="statusMsg" class="status-msg"></div>
                        </div>
                    </section>

                    <!-- Table Section -->
                    <section class="table-container">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Itens em Estoque</h3>
                                <div class="search-wrapper">
                                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                                    <input type="text" id="searchInput" placeholder="Filtrar por nome ou categoria..." onkeyup="filtrarEstoque()">
                                </div>
                            </div>
                            <div class="table-scroll">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>PRODUTO</th>
                                            <th>CATEGORIA</th>
                                            <th>ESTOQUE</th>
                                            <th>PREÇO UNIT.</th>
                                            <th class="text-right">AÇÕES</th>
                                        </tr>
                                    </thead>
                                    <tbody id="listaEstoque">
                                        <!-- Carregado via JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/apiClient.js"></script>
    <script src="../js/estoque.js"></script>
</body>
</html>
